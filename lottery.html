<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可愛隨機抽籤趣</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Noto Sans TC & Quicksand for cute rounded feel -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Quicksand', 'Noto Sans TC', 'sans-serif'],
          },
          colors: {
            pastel: {
              pink: '#FFDEE9',
              blue: '#B5FFFC',
              purple: '#E2D9F3',
              yellow: '#FFF3B0',
              peach: '#FFD3B6',
              green: '#E2F0CB',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
      min-height: 100vh;
    }
    /* 噴發碎紙屑效果 */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      transform: translateY(0px) rotate(0deg);
      animation: fall 3s ease-out infinite;
      pointer-events: none;
      z-index: 50;
    }
    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
    /* 可愛波浪與晃動動畫 */
    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    .wiggle-hover:hover {
      animation: wiggle 0.3s ease-in-out infinite;
    }
    /* 3D 卡片翻轉 */
    .card-container {
      perspective: 1000px;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .card-flipped {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }
    .card-back {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body class="py-8 px-4 text-slate-700 font-sans">

  <!-- 碎紙屑容器 -->
  <div id="confetti-container" class="fixed inset-0 overflow-hidden pointer-events-none"></div>

  <div class="max-w-4xl mx-auto">
    <!-- 網頁標題區 -->
    <header class="text-center mb-8 relative">
      <div class="inline-block bg-white/70 backdrop-blur-md py-4 px-8 rounded-full shadow-lg border-4 border-white/50 relative overflow-hidden">
        <!-- 可愛小裝飾 -->
        <span class="absolute -top-1 -left-2 text-3xl animate-bounce" style="animation-delay: 0.1s">🎈</span>
        <span class="absolute -bottom-1 -right-2 text-3xl animate-bounce" style="animation-delay: 0.5s">✨</span>
        <h1 class="text-3xl md:text-4xl font-black text-rose-500 tracking-wider flex items-center justify-center gap-2">
          <i class="fa-solid fa-gift text-amber-400"></i>
          可愛隨機抽籤趣
          <i class="fa-solid fa-star text-yellow-400 animate-spin" style="animation-duration: 4s"></i>
        </h1>
      </div>
      <p class="text-slate-600 mt-3 font-semibold">老師的點名好幫手、活動的幸運星！🌟</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      
      <!-- 左側：設定控制面板 (5 cols) -->
      <section class="lg:col-span-5 bg-white/80 backdrop-blur-md rounded-3xl p-6 shadow-xl border-4 border-rose-100 flex flex-col justify-between">
        <div>
          <div class="flex items-center gap-2 mb-6 pb-3 border-b-2 border-rose-100/50">
            <span class="text-2xl">⚙️</span>
            <h2 class="text-xl font-bold text-rose-600">抽籤設定</h2>
          </div>

          <!-- 座號區間設定 -->
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-bold text-slate-600 mb-1.5 flex items-center gap-1.5">
                <i class="fa-solid fa-arrow-down-9-1 text-rose-400"></i> 座號範圍
              </label>
              <div class="grid grid-cols-2 gap-3">
                <div class="relative">
                  <span class="absolute left-3 top-2.5 text-xs text-slate-400 font-bold">開始</span>
                  <input type="number" id="start-num" value="1" min="1" max="999" 
                    class="w-full pl-10 pr-3 py-2 border-2 border-rose-200 rounded-2xl focus:outline-none focus:border-rose-400 font-bold text-center text-lg bg-rose-50/30">
                </div>
                <div class="relative">
                  <span class="absolute left-3 top-2.5 text-xs text-slate-400 font-bold">結束</span>
                  <input type="number" id="end-num" value="30" min="1" max="999" 
                    class="w-full pl-10 pr-3 py-2 border-2 border-rose-200 rounded-2xl focus:outline-none focus:border-rose-400 font-bold text-center text-lg bg-rose-50/30">
                </div>
              </div>
            </div>

            <!-- 抽籤數量 -->
            <div>
              <label for="draw-count" class="block text-sm font-bold text-slate-600 mb-1.5 flex items-center gap-1.5">
                <i class="fa-solid fa-user-plus text-rose-400"></i> 每次抽出數量
              </label>
              <div class="flex items-center gap-2">
                <button onclick="changeDrawCount(-1)" class="w-10 h-10 rounded-xl bg-rose-100 text-rose-600 hover:bg-rose-200 font-bold text-lg active:scale-95 transition">
                  <i class="fa-solid fa-minus"></i>
                </button>
                <input type="number" id="draw-count" value="1" min="1" max="50" 
                  class="flex-1 py-2 border-2 border-rose-200 rounded-2xl focus:outline-none focus:border-rose-400 font-bold text-center text-lg bg-rose-50/30">
                <button onclick="changeDrawCount(1)" class="w-10 h-10 rounded-xl bg-rose-100 text-rose-600 hover:bg-rose-200 font-bold text-lg active:scale-95 transition">
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
            </div>

            <!-- 排除重複與剩餘號碼 -->
            <div class="bg-rose-50/50 p-4 rounded-2xl border-2 border-rose-100 space-y-3">
              <div class="flex items-center justify-between">
                <label for="no-repeat" class="text-sm font-bold text-slate-600 flex items-center gap-1.5 cursor-pointer select-none">
                  <i class="fa-solid fa-shield-halved text-rose-400"></i> 防重複抽籤 (不重複)
                </label>
                <div class="relative inline-block w-10 mr-2 align-middle select-none">
                  <input type="checkbox" id="no-repeat" checked class="sr-only peer">
                  <div onclick="toggleNoRepeat()" class="w-10 h-6 bg-slate-300 rounded-full peer-checked:bg-rose-400 cursor-pointer transition-colors duration-200 relative after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                </div>
              </div>

              <!-- 剩餘座號統計與重置 -->
              <div class="flex justify-between items-center text-xs text-slate-500 font-bold pt-2 border-t border-rose-100">
                <div>剩餘可抽號碼：<span id="pool-count" class="text-rose-500 text-sm">30</span> 個</div>
                <button onclick="resetPool()" class="px-2.5 py-1 bg-white hover:bg-rose-100 border border-rose-200 rounded-lg text-rose-500 flex items-center gap-1 transition active:scale-95">
                  <i class="fa-solid fa-rotate-left"></i> 重置號碼池
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 底部大抽籤按鈕 -->
        <div class="mt-6">
          <button onclick="startDraw()" id="draw-btn" class="wiggle-hover w-full py-4 bg-gradient-to-r from-rose-400 to-pink-500 text-white rounded-2xl font-black text-xl shadow-lg shadow-rose-300/50 border-b-4 border-rose-600 hover:from-rose-500 hover:to-pink-600 active:border-b-0 active:translate-y-1 transition-all duration-150 flex items-center justify-center gap-2">
            <i class="fa-solid fa-wand-magic-sparkles animate-pulse"></i>
            開始抽籤！
          </button>
        </div>
      </section>

      <!-- 右側：主要展示與紀錄區 (7 cols) -->
      <section class="lg:col-span-7 flex flex-col gap-6">
        
        <!-- 抽出展示大舞台 -->
        <div class="bg-white/80 backdrop-blur-md rounded-3xl p-6 shadow-xl border-4 border-emerald-100 flex-1 flex flex-col justify-between min-h-[400px]">
          <div class="flex items-center justify-between pb-3 border-b-2 border-emerald-100/50">
            <div class="flex items-center gap-2">
              <span class="text-2xl">🎉</span>
              <h2 class="text-xl font-bold text-emerald-600">幸運得主</h2>
            </div>
            <div id="draw-status" class="text-xs font-bold px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full border border-emerald-200">
              等待抽籤中
            </div>
          </div>

          <!-- 抽籤展示區（動態生成卡片的地方） -->
          <div id="results-display" class="flex-1 flex flex-wrap items-center justify-center gap-5 py-6 content-center">
            <div class="text-center text-slate-400 py-12">
              <i class="fa-solid fa-clover text-5xl mb-3 text-emerald-200 animate-bounce"></i>
              <p class="font-bold">點擊左側「開始抽籤」</p>
              <p class="text-xs mt-1">好運即將降臨！</p>
            </div>
          </div>
        </div>

        <!-- 歷史紀錄 -->
        <div class="bg-white/80 backdrop-blur-md rounded-3xl p-5 shadow-xl border-4 border-indigo-100 flex flex-col">
          <div class="flex items-center justify-between pb-3 border-b-2 border-indigo-100/50 mb-3">
            <div class="flex items-center gap-2">
              <span class="text-xl">📜</span>
              <h2 class="text-base font-bold text-indigo-600">中籤歷史紀錄</h2>
            </div>
            <button onclick="clearHistory()" class="text-xs text-indigo-500 hover:text-indigo-700 font-bold flex items-center gap-1 transition">
              <i class="fa-solid fa-trash-can"></i> 清除歷史
            </button>
          </div>

          <!-- 歷史列表容器 -->
          <div id="history-container" class="flex flex-col gap-2.5 max-h-[180px] overflow-y-auto pr-1">
            <p class="text-xs text-slate-400 font-bold py-4 w-full text-center">暫無紀錄</p>
          </div>
        </div>

      </section>

    </div>
  </div>

  <!-- 自訂提示視窗 Modal (取代內建 alert) -->
  <div id="alert-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-3xl p-6 max-w-sm w-full mx-4 shadow-2xl border-4 border-rose-200 transform scale-90 transition-transform duration-300" id="alert-card">
      <div class="text-center">
        <span class="text-5xl block mb-3">⚠️</span>
        <h3 class="text-xl font-black text-rose-500 mb-2" id="alert-title">提示訊息</h3>
        <p class="text-slate-600 font-semibold mb-6" id="alert-msg">請輸入正確的數值！</p>
        <button onclick="closeAlert()" class="px-6 py-2 bg-rose-400 hover:bg-rose-500 text-white rounded-2xl font-black shadow-md shadow-rose-200 active:scale-95 transition">
          我知道了
        </button>
      </div>
    </div>
  </div>

  <script>
    // 儲存目前可抽的號碼池與歷史紀錄
    let numberPool = [];
    let historyRecords = [];
    let totalDrawCount = 0; // 累計抽籤次數計數器
    let isDrawing = false;

    // 音效產生器 (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTone(freq, type, duration) {
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.log("Audio not supported or allowed yet");
      }
    }

    function playTickSound() {
      playTone(600, 'sine', 0.05);
    }

    function playSuccessSound() {
      playTone(523.25, 'triangle', 0.1); // C5
      setTimeout(() => playTone(659.25, 'triangle', 0.1), 100); // E5
      setTimeout(() => playTone(783.99, 'triangle', 0.1), 200); // G5
      setTimeout(() => playTone(1046.50, 'triangle', 0.3), 300); // C6
    }

    function playWarningSound() {
      playTone(220, 'sawtooth', 0.3);
    }

    // 初始化與防呆
    window.onload = function() {
      initPool();
      
      // 綁定輸入改變事件
      document.getElementById('start-num').addEventListener('change', () => { validateInputs(); initPool(); });
      document.getElementById('end-num').addEventListener('change', () => { validateInputs(); initPool(); });
      document.getElementById('no-repeat').addEventListener('change', () => { initPool(); });
    }

    // 顯示自訂 Alert
    function showAlert(title, message) {
      playWarningSound();
      const modal = document.getElementById('alert-modal');
      const card = document.getElementById('alert-card');
      document.getElementById('alert-title').innerText = title;
      document.getElementById('alert-msg').innerText = message;
      
      modal.classList.remove('opacity-0', 'pointer-events-none');
      card.classList.remove('scale-90');
      card.classList.add('scale-100');
    }

    function closeAlert() {
      const modal = document.getElementById('alert-modal');
      const card = document.getElementById('alert-card');
      modal.classList.add('opacity-0', 'pointer-events-none');
      card.classList.remove('scale-100');
      card.classList.add('scale-90');
    }

    // 調整抽籤數量
    function changeDrawCount(val) {
      const input = document.getElementById('draw-count');
      let current = parseInt(input.value) || 1;
      current += val;
      if (current < 1) current = 1;
      if (current > 50) current = 50;
      input.value = current;
    }

    // 驗證輸入範圍與合理性
    function validateInputs() {
      const startInput = document.getElementById('start-num');
      const endInput = document.getElementById('end-num');
      
      let start = parseInt(startInput.value) || 1;
      let end = parseInt(endInput.value) || 1;

      if (start < 1) start = 1;
      if (end < 1) end = 1;
      if (start > 999) start = 999;
      if (end > 999) end = 999;

      if (start > end) {
        // 自動對調
        let temp = start;
        start = end;
        end = temp;
      }

      startInput.value = start;
      endInput.value = end;
    }

    // 開關不重複
    function toggleNoRepeat() {
      const checkbox = document.getElementById('no-repeat');
      checkbox.checked = !checkbox.checked;
      initPool();
    }

    // 初始化與重置號碼池
    function initPool() {
      validateInputs();
      const start = parseInt(document.getElementById('start-num').value);
      const end = parseInt(document.getElementById('end-num').value);
      const isNoRepeat = document.getElementById('no-repeat').checked;

      numberPool = [];
      for (let i = start; i <= end; i++) {
        numberPool.push(i);
      }

      updatePoolUI();
    }

    // 重置號碼池與次數
    function resetPool() {
      initPool();
      playTone(440, 'sine', 0.15);
    }

    function updatePoolUI() {
      const isNoRepeat = document.getElementById('no-repeat').checked;
      const poolCountEl = document.getElementById('pool-count');
      
      if (isNoRepeat) {
        poolCountEl.innerText = numberPool.length;
      } else {
        const start = parseInt(document.getElementById('start-num').value);
        const end = parseInt(document.getElementById('end-num').value);
        poolCountEl.innerText = (end - start + 1) || 0;
      }
    }

    // 開始抽籤主程式
    function startDraw() {
      if (isDrawing) return;

      const start = parseInt(document.getElementById('start-num').value);
      const end = parseInt(document.getElementById('end-num').value);
      const drawCount = parseInt(document.getElementById('draw-count').value) || 1;
      const isNoRepeat = document.getElementById('no-repeat').checked;

      // 防呆：範圍
      if (isNaN(start) || isNaN(end) || start > end) {
        showAlert('設定錯誤', '請填寫正確的座號範圍！');
        return;
      }

      // 防呆：數量
      if (drawCount < 1) {
        showAlert('設定錯誤', '每次抽出數量至少要 1 個唷！');
        return;
      }

      // 當不重複抽籤時，檢查剩餘號碼
      if (isNoRepeat && numberPool.length === 0) {
        showAlert('號碼抽完了！', '請點選「重置號碼池」或取消「防重複抽籤」再繼續。');
        return;
      }

      let actualDrawCount = drawCount;
      if (isNoRepeat && numberPool.length < drawCount) {
        actualDrawCount = numberPool.length;
      }

      isDrawing = true;
      document.getElementById('draw-btn').disabled = true;
      document.getElementById('draw-status').innerText = '正在洗牌抽籤中...';
      document.getElementById('draw-status').className = "text-xs font-bold px-3 py-1 bg-amber-50 text-amber-600 rounded-full border border-amber-200 animate-pulse";

      const displayArea = document.getElementById('results-display');
      displayArea.innerHTML = ''; // 清空先前的顯示

      // 產生展示卡片（初始背面朝上）
      const cards = [];
      const colors = ['bg-pastel-pink', 'bg-pastel-blue', 'bg-pastel-purple', 'bg-pastel-yellow', 'bg-pastel-peach', 'bg-pastel-green'];
      
      for (let i = 0; i < actualDrawCount; i++) {
        const cardColor = colors[i % colors.length];
        const cardHtml = `
          <div class="card-container w-28 h-36 md:w-36 md:h-48 m-2 transition-all duration-300 hover:scale-105">
            <div id="card-inner-${i}" class="card-inner w-full h-full shadow-lg rounded-[24px] md:rounded-[32px]">
              <!-- 卡片正面 (問號與滾動狀態) -->
              <div class="card-front w-full h-full bg-gradient-to-br from-rose-300 to-pink-400 border-4 border-white flex flex-col items-center justify-center rounded-[24px] md:rounded-[32px] shadow-md">
                <span id="scroller-${i}" class="text-white text-3xl md:text-4xl font-black drop-shadow-sm">?</span>
                <span class="text-pink-100 text-[9px] md:text-[10px] font-bold tracking-widest uppercase mt-1 animate-pulse">DRAWING</span>
              </div>
              <!-- 卡片背面 (結果 - 文字改用極富喜氣感的 text-rose-600) -->
              <div class="card-back w-full h-full ${cardColor} border-4 border-white flex flex-col items-center justify-center rounded-[24px] md:rounded-[32px] shadow-inner relative p-2">
                <span class="absolute top-2 text-rose-500/80 text-[10px] md:text-[11px] tracking-wider font-black uppercase">LUCKY</span>
                <span id="result-num-${i}" class="text-rose-600 text-5xl md:text-6xl font-black tracking-tight drop-shadow-md my-auto">--</span>
                <span class="text-rose-500 text-xs md:text-sm font-black mb-2">號</span>
              </div>
            </div>
          </div>
        `;
        displayArea.insertAdjacentHTML('beforeend', cardHtml);
        cards.push({
          inner: document.getElementById(`card-inner-${i}`),
          scroller: document.getElementById(`scroller-${i}`),
          resultNum: document.getElementById(`result-num-${i}`)
        });
      }

      // 進行滾動動畫效果
      let tickCount = 0;
      const maxTicks = 20; // 滾動次數
      const tickInterval = 80; // 毫秒

      // 先抽出結果
      const results = [];
      for (let i = 0; i < actualDrawCount; i++) {
        let pickedNum;
        if (isNoRepeat) {
          const randomIndex = Math.floor(Math.random() * numberPool.length);
          pickedNum = numberPool.splice(randomIndex, 1)[0];
        } else {
          pickedNum = Math.floor(Math.random() * (end - start + 1)) + start;
        }
        results.push(pickedNum);
      }

      // 滾動定時器
      const timer = setInterval(() => {
        tickCount++;
        playTickSound();

        cards.forEach((card, idx) => {
          // 滾動期間顯示隨機號碼
          const tempNum = Math.floor(Math.random() * (end - start + 1)) + start;
          card.scroller.innerText = tempNum;
        });

        if (tickCount >= maxTicks) {
          clearInterval(timer);
          
          // 依序翻牌效果
          results.forEach((num, idx) => {
            setTimeout(() => {
              // 填入最終真實號碼
              cards[idx].resultNum.innerText = num;
              
              // 針對 3 位數進行防爆框微調
              if (num.toString().length >= 3) {
                cards[idx].resultNum.className = "text-rose-600 text-4xl md:text-5xl font-black tracking-tight drop-shadow-md my-auto";
              } else {
                cards[idx].resultNum.className = "text-rose-600 text-5xl md:text-6xl font-black tracking-tight drop-shadow-md my-auto";
              }

              // 翻牌
              cards[idx].inner.classList.add('card-flipped');
              playTone(600 + (idx * 100), 'triangle', 0.15);

              // 如果是最後一張卡片，釋放狀態
              if (idx === results.length - 1) {
                setTimeout(() => {
                  isDrawing = false;
                  document.getElementById('draw-btn').disabled = false;
                  document.getElementById('draw-status').innerText = `順利抽出 ${actualDrawCount} 個座號！`;
                  document.getElementById('draw-status').className = "text-xs font-bold px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full border border-emerald-200";
                  
                  playSuccessSound();
                  spawnConfetti();
                  
                  // 寫入歷史紀錄
                  addHistory(results);
                  updatePoolUI();
                }, 400);
              }
            }, idx * 300); // 遞增延遲，營造逐一開獎感
          });
        }
      }, tickInterval);
    }

    // 新增中籤歷史紀錄 (自動記錄並計算總批次)
    function addHistory(numbers) {
      totalDrawCount++;
      const timestamp = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      
      // 將每次抽籤的編號(totalDrawCount)與順序一併記錄
      historyRecords.unshift({ 
        id: totalDrawCount, 
        time: timestamp, 
        nums: [...numbers] // 這裡儲存的數組即為當次抽出的精確順序
      });

      // 只保留最近 30 筆
      if (historyRecords.length > 30) {
        historyRecords.pop();
      }

      renderHistory();
    }

    // 渲染歷史紀錄 UI (呈現明確的抽籤順序)
    function renderHistory() {
      const container = document.getElementById('history-container');
      if (historyRecords.length === 0) {
        container.innerHTML = '<p class="text-xs text-slate-400 font-bold py-4 w-full text-center">暫無紀錄</p>';
        return;
      }

      container.innerHTML = '';
      historyRecords.forEach((record) => {
        const itemHtml = `
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 bg-indigo-50/60 border border-indigo-100/80 rounded-2xl p-3 text-xs font-bold w-full shadow-sm hover:border-indigo-200 transition-colors">
            <!-- 批次順序標籤 -->
            <div class="flex items-center gap-2">
              <span class="bg-indigo-600 text-white px-2.5 py-1 rounded-full text-[10px] tracking-wide shadow-sm flex items-center gap-1">
                <i class="fa-solid fa-ranking-star"></i>
                第 ${record.id} 次抽籤
              </span>
              <span class="text-slate-400 text-[10px] font-normal">${record.time}</span>
            </div>
            <!-- 當次抽出的號碼（附帶當次提取順序小圓標） -->
            <div class="flex flex-wrap gap-3 items-center">
              <span class="text-slate-400 text-[10px] font-bold">抽出順序：</span>
              <div class="flex flex-wrap gap-2">
                ${record.nums.map((n, idx) => `
                  <div class="relative flex items-center justify-center pt-1.5 px-0.5">
                    <!-- 可愛中籤座號球 (喜氣玫瑰紅) -->
                    <span class="bg-gradient-to-br from-rose-400 to-pink-500 text-white rounded-full w-7 h-7 flex items-center justify-center text-xs font-black shadow-md border border-white">
                      ${n}
                    </span>
                    <!-- 抽出先後順序小圓標 (黃金序號 ① ② ③...) -->
                    <span class="absolute -top-1 -right-1 bg-amber-400 text-slate-800 rounded-full w-4 h-4 flex items-center justify-center text-[9px] border border-white font-black shadow-sm scale-90">
                      ${idx + 1}
                    </span>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', itemHtml);
      });
    }

    // 清除歷史紀錄 (重設計數器與紀錄)
    function clearHistory() {
      historyRecords = [];
      totalDrawCount = 0;
      renderHistory();
      playTone(300, 'sine', 0.1);
    }

    // 碎紙屑噴灑特效
    function spawnConfetti() {
      const container = document.getElementById('confetti-container');
      container.innerHTML = ''; // 先清除舊的

      const colors = ['#FFC0CB', '#FFD700', '#ADFF2F', '#87CEFA', '#DA70D6', '#FF7F50'];
      const numConfetti = 60;

      for (let i = 0; i < numConfetti; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        
        // 隨機定位與樣式
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.transform = `scale(${Math.random() * 0.8 + 0.4})`;
        
        // 隨機動畫延遲與速度
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        confetti.style.animationDuration = Math.random() * 2 + 1.5 + 's';

        container.appendChild(confetti);
      }

      // 3秒後自動移除碎紙屑以節省資源
      setTimeout(() => {
        container.innerHTML = '';
      }, 3500);
    }
  </script>
</body>
</html>
